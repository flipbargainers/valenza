media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: site
    label: Site Settings
    type: file
    path: site.json
    format: json
    fields:
      - name: title
        label: Browser Title
        type: string
      - name: brandName
        label: Brand Name
        type: string
      - name: header
        label: Header Buttons
        type: object
        fields:
          - name: searchButton
            label: Search Button Text
            type: string
          - name: cartButton
            label: Cart Button Text
            type: string
      - name: hero
        label: Main Buttons
        type: object
        fields:
          - name: shopNowButton
            label: Shop Now Text
            type: string
          - name: exploreButton
            label: Explore Text
            type: string

  - name: homepage
    label: Homepage
    type: file
    path: home.json
    format: json
    fields:
      - name: hero
        label: Hero Banner
        type: object
        fields:
          - name: kicker
            label: Top Left Kicker (e.g. NEW COLLECTION)
            type: string
          - name: title
            label: Main Title
            type: string
          - name: subtitle
            label: Main Subtitle
            type: text
          - name: sideKicker
            label: Right Kicker (e.g. LIMITED DROP)
            type: string
          - name: sideTitle
            label: Right Side Title
            type: string
          - name: sideSubtitle
            label: Right Side Subtitle
            type: text
          - name: gradientColor
            label: Accent Color (Hex)
            type: string
          - name: fannedImages
            label: Hero Image Cards
            type: image
            list: true
      - name: productSections
        label: Homepage Product Rows
        type: object
        list: true
        fields:
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Subtitle
            type: string
          - name: mode
            label: Fill Mode
            type: select
            options: [latest, featured, category, collection, tag, ids]
          - name: value
            label: Category or Collection Name
            type: string
          - name: limit
            label: Product Limit
            type: number
      - name: genderSection
        label: Promo Cards (Male/Female)
        type: object
        fields:
          - name: enabled
            label: Section Enabled?
            type: boolean
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Subtitle
            type: text
          - name: maleLabel
            label: Male Card Label
            type: string
          - name: maleImage
            label: Male Card Image
            type: image
          - name: femaleLabel
            label: Female Card Label
            type: string
          - name: femaleImage
            label: Female Card Image
            type: image
          - name: ctaLabel
            label: Card Button Text
            type: string

  - name: products
    label: Products Catalog
    type: file
    path: products.json
    format: json
    fields:
      - name: items
        label: Product List
        type: object
        list: true
        fields:
          - name: id
            label: ID Number
            type: number
          - name: name
            label: Name
            type: string
          - name: category
            label: Category
            type: select
            options: [sneakers, apparel, accessories]
          - name: price
            label: Price
            type: number
          - name: originalPrice
            label: Original Price
            type: number
          - name: images
            label: Images
            type: image
            list: true
          - name: description
            label: Description
            type: text
          - name: collection
            label: Collection Slug
            type: string
          - name: gender
            label: Gender
            type: select
            options: [male, female, unisex]
          - name: status
            label: Status
            type: select
            options: [published, draft]
          - name: featured
            label: Featured?
            type: boolean

  - name: collections
    label: Collections
    type: file
    path: collections.json
    format: json
    fields:
      - name: items
        label: Collections List
        type: object
        list: true
        fields:
          - name: slug
            label: Slug (ID)
            type: string
          - name: title
            label: Title
            type: string
          - name: subtitle
            label: Subtitle
            type: string
          - name: image
            label: Banner Image
            type: image
