media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: site
    label: Site Settings
    type: file
    path: site.json
    format: json
    fields:
      - name: title
        label: Browser Title
        type: string
      - name: brandName
        label: Brand Name
        type: string
      - name: nav
        label: Navigation Links
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: page
            label: Target Page
            type: select
            options: [home, plp, collections]
      - name: header
        label: Header Labels
        type: object
        fields:
          - name: searchButton
            label: Search Button
            type: string
          - name: cartButton
            label: Cart Button
            type: string
      - name: hero
        label: Hero Buttons
        type: object
        fields:
          - name: shopNowButton
            label: Shop Now Button
            type: string
          - name: exploreButton
            label: Explore Button
            type: string
      - name: homeCollections
        label: Home Collections Block
        type: object
        fields:
          - name: title
            label: Collections Title
            type: string
          - name: viewAllButton
            label: Collections View All
            type: string
      - name: pages
        label: Page Labels
        type: object
        fields:
          - name: collectionsTitle
            label: Collections Page Title
            type: string
          - name: shopAllTitle
            label: Shop All Page Title
            type: string
          - name: pdpBackButton
            label: Product Page Back Button
            type: string
          - name: productSectionViewAllButton
            label: Product Section View All
            type: string
          - name: productCountSuffix
            label: Product Count Suffix
            type: string
      - name: search
        label: Search
        type: object
        fields:
          - name: placeholder
            label: Search Placeholder
            type: string
          - name: startTypingMessage
            label: Start Typing Message
            type: string
          - name: noResultsMessage
            label: No Results Message
            type: string
      - name: footer
        label: Footer
        type: object
        fields:
          - name: tagline
            label: Tagline
            type: string
          - name: socialTitle
            label: Social Section Title
            type: string
          - name: socialLinks
            label: Social Links
            type: object
            list: true
            fields:
              - name: label
                label: Platform Name
                type: string
              - name: url
                label: URL
                type: string
              - name: icon
                label: Icon Name
                type: select
                options: [instagram, facebook, x, tiktok, youtube, linkedin, snapchat]
          - name: columns
            label: Footer Columns
            type: object
            list: true
            fields:
              - name: title
                label: Column Title
                type: string
              - name: links
                label: Links
                type: object
                list: true
                fields:
                  - name: label
                    label: Link Label
                    type: string
                  - name: action
                    label: Action
                    type: string
      - name: profile
        label: Profile Modal
        type: object
        fields:
          - name: navLabel
            label: Header Profile Text
            type: string
          - name: title
            label: Modal Title
            type: string
          - name: closeButton
            label: Close Button
            type: string
          - name: saveButton
            label: Save Button Label
            type: string
          - name: namePlaceholder
            label: Name Placeholder
            type: string
          - name: emailPlaceholder
            label: Email Placeholder
            type: string
          - name: savedMessage
            label: Profile Saved Message
            type: string
      - name: theme
        label: Theme Effects
        type: object
        fields:
          - name: imageHoverScale
            label: Global Image Hover Scale
            type: number
          - name: pdpZoomScale
            label: PDP Zoom Scale
            type: number
      - name: pdp
        label: Product Page Labels
        type: object
        fields:
          - name: addToCartLabel
            label: Add To Cart Button
            type: string
          - name: buyNowLabel
            label: Buy Now Button
            type: string
          - name: relatedTitle
            label: Related Products Title
            type: string
      - name: product
        label: Product Labels
        type: object
        fields:
          - name: stockLabel
            label: Stock Label
            type: string
          - name: stockUnknown
            label: Stock Unknown Label
            type: string
          - name: outOfStockLabel
            label: Out Of Stock Label
            type: string
          - name: addedToCartMessage
            label: Added To Cart Message
            type: string
      - name: cart
        label: Cart Labels
        type: object
        fields:
          - name: title
            label: Cart Title
            type: string
          - name: closeButton
            label: Cart Close Button
            type: string
          - name: subtotalLabel
            label: Subtotal Label
            type: string
          - name: emptyMessage
            label: Empty Cart Message
            type: string
          - name: removeButton
            label: Remove Button Label
            type: string
      - name: subscribe
        label: Subscribe Labels
        type: object
        fields:
          - name: emailPlaceholder
            label: Subscribe Email Placeholder
            type: string
          - name: successMessage
            label: Subscribe Success Message
            type: string
      - name: checkout
        label: Checkout Modal
        type: object
        fields:
          - name: cartCheckoutLabel
            label: Cart Checkout Button
            type: string
          - name: title
            label: Checkout Title
            type: string
          - name: closeButton
            label: Checkout Close Button
            type: string
          - name: cardNumberLabel
            label: Card Number Label
            type: string
          - name: cardNameLabel
            label: Card Name Label
            type: string
          - name: expiryLabel
            label: Expiry Label
            type: string
          - name: cvvLabel
            label: CVV Label
            type: string
          - name: cardNumberPlaceholder
            label: Card Number Placeholder
            type: string
          - name: cardNamePlaceholder
            label: Cardholder Name Placeholder
            type: string
          - name: expiryPlaceholder
            label: Expiry Placeholder
            type: string
          - name: cvvPlaceholder
            label: CVV Placeholder
            type: string
          - name: payNowLabel
            label: Pay Button Label
            type: string
          - name: successMessage
            label: Success Message
            type: string
          - name: noItemsMessage
            label: No Items Message
            type: string
      - name: navigation
        label: Navigation
        type: object
        fields:
          - name: backLabel
            label: Back Button Label
            type: string

  - name: home
    label: Homepage
    type: file
    path: home.json
    format: json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - name: kicker
            label: Top Text
            type: string
          - name: title
            label: Main Title
            type: string
          - name: subtitle
            label: Subtitle
            type: text
          - name: sideKicker
            label: Right Small Text
            type: string
          - name: sideTitle
            label: Right Title
            type: string
          - name: sideSubtitle
            label: Right Subtitle
            type: text
          - name: gradientColor
            label: Hero Gradient Color
            type: string
          - name: fannedImages
            label: Fanned Images
            type: image
            list: true
      - name: productSections
        label: Product Sections
        type: object
        list: true
        fields:
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Label
            type: string
          - name: mode
            label: Fill Mode
            type: select
            options: [latest, featured, category, collection, tag, ids]
          - name: value
            label: Filter Value
            type: string
          - name: limit
            label: Product Count
            type: number
      - name: genderSection
        label: Male Female Section
        type: object
        fields:
          - name: enabled
            label: Show Section
            type: boolean
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Subtitle
            type: string
          - name: maleLabel
            label: Male Card Label
            type: string
          - name: femaleLabel
            label: Female Card Label
            type: string
          - name: maleImage
            label: Male Card Image
            type: image
          - name: femaleImage
            label: Female Card Image
            type: image
          - name: limit
            label: Products Per Card
            type: number
          - name: ctaLabel
            label: Card Button Label
            type: string
      - name: reviewsTitle
        label: Reviews Title
        type: string
      - name: subscribe
        label: Subscribe Section
        type: object
        fields:
          - name: title
            label: Subscribe Title
            type: string
          - name: text
            label: Subscribe Text
            type: text
          - name: buttonLabel
            label: Subscribe Button Label
            type: string

  - name: products
    label: Products
    type: file
    path: products.json
    format: json
    fields:
      - name: items
        label: Product List
        type: object
        list: true
        fields:
          - name: id
            label: ID
            type: number
          - name: name
            label: Name
            type: string
          - name: category
            label: Category
            type: string
          - name: price
            label: Price
            type: number
          - name: originalPrice
            label: Original Price
            type: number
          - name: images
            label: Images
            type: image
            list: true
          - name: description
            label: Description
            type: text
          - name: collection
            label: Collection Slug
            type: string
          - name: gender
            label: Gender
            type: select
            options: [male, female, unisex]
          - name: sku
            label: SKU
            type: string
          - name: stock
            label: Stock
            type: number
          - name: status
            label: Status
            type: select
            options: [published, draft]
          - name: featured
            label: Featured Product
            type: boolean
          - name: tags
            label: Tags
            type: string
            list: true

  - name: collections
    label: Collections
    type: file
    path: collections.json
    format: json
    fields:
      - name: items
        label: Collection List
        type: object
        list: true
        fields:
          - name: slug
            label: Slug
            type: string
          - name: title
            label: Title
            type: string
          - name: subtitle
            label: Subtitle
            type: text
          - name: image
            label: Image
            type: image

  - name: reviews
    label: Reviews
    type: file
    path: reviews.json
    format: json
    fields:
      - name: items
        label: Review List
        type: object
        list: true
        fields:
          - name: name
            label: Name
            type: string
          - name: rating
            label: Rating
            type: number
          - name: text
            label: Text
            type: text
          - name: date
            label: Date Label
            type: string

  - name: commerce
    label: Commerce Settings
    type: file
    path: commerce.json
    format: json
    fields:
      - name: apiBaseUrl
        label: Backend API Base URL
        type: string
      - name: useLiveBackendProducts
        label: Load Products From Backend
        type: boolean
      - name: checkoutMode
        label: Checkout Mode
        type: select
        options: [stripe_checkout]
      - name: providerName
        label: Payment Provider Name
        type: string
      - name: providerDashboardUrl
        label: Provider Dashboard URL
        type: string
      - name: currency
        label: Currency Code
        type: string
      - name: currencySymbol
        label: Currency Symbol
        type: string
      - name: requireProfileEmail
        label: Require Profile Email For Checkout
        type: boolean
      - name: missingApiMessage
        label: Missing API Message
        type: string
      - name: missingEmailMessage
        label: Missing Email Message
        type: string
      - name: checkoutFailedMessage
        label: Checkout Failed Message
        type: string
      - name: checkoutRequestFailedMessage
        label: Checkout Request Error Message
        type: string
      - name: paymentCancelledMessage
        label: Payment Cancelled Message
        type: string
