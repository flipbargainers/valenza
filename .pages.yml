media:
  input: assets/uploads
  output: /assets/uploads
  extensions: [jpg, jpeg, png, gif, webp, svg]

settings:
  content:
    merge: true

content:
  - name: products
    label: Products
    type: collection
    path: content
    filename: products.json
    format: json
    view:
      fields: [id, name, price, stock, status, featured]
      primary: name
      sort: [id, name]
      default:
        sort: id
        order: desc
    fields:
      - name: id
        label: ID
        type: number
        required: true
      - name: name
        label: Product Name
        type: string
        required: true
      - name: status
        label: Status
        type: select
        options:
          - published
          - draft
        default: draft
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: images
        label: Product Images
        type: image
        list: true
      - name: category
        label: Category
        type: select
        options:
          - sneakers
          - apparel
          - accessories
          - headwear
          - bags
      - name: collection
        label: Collection
        type: select
        options:
          - summer
          - night
          - tech
          - heritage
      - name: gender
        label: Gender
        type: select
        options:
          - male
          - female
          - unisex
      - name: price
        label: Price
        type: number
      - name: originalPrice
        label: Compare At Price
        type: number
      - name: stock
        label: Stock
        type: number
        default: 0
      - name: sku
        label: SKU
        type: string
      - name: tags
        label: Tags
        type: string
        list: true
      - name: description
        label: Description
        type: text

  - name: collections
    label: Collections
    type: collection
    path: content
    filename: collections.json
    format: json
    view:
      fields: [slug, title, subtitle]
      primary: title
    fields:
      - name: slug
        label: URL Slug
        type: string
        required: true
        pattern: '^[a-z0-9-]+$'
      - name: title
        label: Collection Title
        type: string
        required: true
      - name: subtitle
        label: Subtitle
        type: text
      - name: image
        label: Hero Image
        type: image

  - name: reviews
    label: Reviews
    type: collection
    path: content
    filename: reviews.json
    format: json
    view:
      fields: [name, rating, date]
      primary: name
    fields:
      - name: name
        label: Customer Name
        type: string
      - name: rating
        label: Rating
        type: number
        min: 1
        max: 5
      - name: text
        label: Review Text
        type: text
      - name: date
        label: Date
        type: string

  - name: homepage
    label: Homepage Builder
    type: file
    path: content/home.json
    format: json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: kicker
            label: Top Label
            type: string
          - name: title
            label: Main Title
            type: string
          - name: subtitle
            label: Subtitle
            type: text
          - name: sideKicker
            label: Side Kicker
            type: string
          - name: sideTitle
            label: Side Title
            type: string
          - name: sideSubtitle
            label: Side Subtitle
            type: text
          - name: gradientColor
            label: Gradient Color
            type: string
            pattern: '^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$'
          - name: fannedImages
            label: Hero Images
            type: image
            list: true
      - name: productSections
        label: Product Sections
        type: object
        list: true
        fields:
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Label
            type: string
          - name: mode
            label: Display Mode
            type: select
            options:
              - latest
              - featured
              - category
              - collection
              - tag
              - ids
          - name: value
            label: Filter Value
            type: string
          - name: limit
            label: Max Products
            type: number
            default: 4
      - name: genderSection
        label: Gender Section
        type: object
        fields:
          - name: enabled
            label: Show Section
            type: boolean
          - name: title
            label: Section Title
            type: string
          - name: subtitle
            label: Section Subtitle
            type: string
          - name: maleLabel
            label: Male Label
            type: string
          - name: femaleLabel
            label: Female Label
            type: string
          - name: maleImage
            label: Male Image
            type: image
          - name: femaleImage
            label: Female Image
            type: image
          - name: limit
            label: Products Per Card
            type: number
            default: 3
          - name: ctaLabel
            label: Button Label
            type: string
      - name: reviewsTitle
        label: Reviews Section Title
        type: string
      - name: subscribe
        label: Subscribe Section
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: text
            label: Text
            type: text
          - name: buttonLabel
            label: Button Label
            type: string

  - name: sitewide
    label: Site Settings
    type: file
    path: content/site.json
    format: json
    fields:
      - name: title
        label: Browser Title
        type: string
      - name: brandName
        label: Brand Name
        type: string
      - name: nav
        label: Navigation
        type: object
        list: true
        fields:
          - name: label
            label: Link Text
            type: string
          - name: page
            label: Target Page
            type: select
            options:
              - home
              - plp
              - collections
      - name: header
        label: Header
        type: object
        fields:
          - name: searchButton
            label: Search Button
            type: string
          - name: cartButton
            label: Cart Button
            type: string
      - name: hero
        label: Hero Buttons
        type: object
        fields:
          - name: shopNowButton
            label: Shop Now
            type: string
          - name: exploreButton
            label: Explore
            type: string
      - name: homeCollections
        label: Collections Block
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: viewAllButton
            label: View All Button
            type: string
      - name: pages
        label: Page Labels
        type: object
        fields:
          - name: collectionsTitle
            label: Collections Page Title
            type: string
          - name: shopAllTitle
            label: Shop All Title
            type: string
          - name: pdpBackButton
            label: Back Button
            type: string
          - name: productSectionViewAllButton
            label: View All Button
            type: string
          - name: productCountSuffix
            label: Product Count Suffix
            type: string
      - name: search
        label: Search
        type: object
        fields:
          - name: placeholder
            label: Placeholder
            type: string
          - name: startTypingMessage
            label: Start Typing Message
            type: string
          - name: noResultsMessage
            label: No Results Message
            type: string
      - name: footer
        label: Footer
        type: object
        fields:
          - name: tagline
            label: Tagline
            type: string
          - name: socialTitle
            label: Social Title
            type: string
          - name: socialLinks
            label: Social Links
            type: object
            list: true
            fields:
              - name: label
                label: Platform
                type: string
              - name: url
                label: URL
                type: string
              - name: icon
                label: Icon
                type: select
                options:
                  - instagram
                  - facebook
                  - x
                  - tiktok
                  - youtube
                  - linkedin
                  - snapchat
          - name: columns
            label: Footer Columns
            type: object
            list: true
            fields:
              - name: title
                label: Column Title
                type: string
              - name: links
                label: Links
                type: object
                list: true
                fields:
                  - name: label
                    label: Link Text
                    type: string
                  - name: action
                    label: Action
                    type: string
      - name: profile
        label: Profile Modal
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: saveButton
            label: Save Button
            type: string
          - name: closeButton
            label: Close Button
            type: string
          - name: navLabel
            label: Nav Label
            type: string
          - name: namePlaceholder
            label: Name Placeholder
            type: string
          - name: emailPlaceholder
            label: Email Placeholder
            type: string
          - name: savedMessage
            label: Saved Message
            type: string
      - name: theme
        label: Theme
        type: object
        fields:
          - name: imageHoverScale
            label: Image Hover Scale
            type: number
          - name: pdpZoomScale
            label: PDP Zoom Scale
            type: number
      - name: pdp
        label: Product Page
        type: object
        fields:
          - name: addToCartLabel
            label: Add to Cart
            type: string
          - name: buyNowLabel
            label: Buy Now
            type: string
          - name: relatedTitle
            label: Related Title
            type: string
      - name: product
        label: Product Labels
        type: object
        fields:
          - name: stockLabel
            label: Stock Label
            type: string
          - name: stockUnknown
            label: Stock Unknown
            type: string
          - name: outOfStockLabel
            label: Out of Stock
            type: string
          - name: addedToCartMessage
            label: Added to Cart
            type: string
      - name: cart
        label: Cart
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: closeButton
            label: Close Button
            type: string
          - name: subtotalLabel
            label: Subtotal Label
            type: string
          - name: emptyMessage
            label: Empty Message
            type: string
          - name: removeButton
            label: Remove Button
            type: string
      - name: subscribe
        label: Subscribe
        type: object
        fields:
          - name: emailPlaceholder
            label: Email Placeholder
            type: string
          - name: successMessage
            label: Success Message
            type: string
      - name: checkout
        label: Checkout
        type: object
        fields:
          - name: cartCheckoutLabel
            label: Cart Checkout
            type: string
          - name: title
            label: Title
            type: string
          - name: closeButton
            label: Close Button
            type: string
          - name: cardNumberLabel
            label: Card Number Label
            type: string
          - name: cardNameLabel
            label: Card Name Label
            type: string
          - name: expiryLabel
            label: Expiry Label
            type: string
          - name: cvvLabel
            label: CVV Label
            type: string
          - name: cardNumberPlaceholder
            label: Card Number Placeholder
            type: string
          - name: cardNamePlaceholder
            label: Card Name Placeholder
            type: string
          - name: expiryPlaceholder
            label: Expiry Placeholder
            type: string
          - name: cvvPlaceholder
            label: CVV Placeholder
            type: string
          - name: payNowLabel
            label: Pay Now
            type: string
          - name: successMessage
            label: Success Message
            type: string
          - name: noItemsMessage
            label: No Items Message
            type: string
      - name: navigation
        label: Navigation
        type: object
        fields:
          - name: backLabel
            label: Back Label
            type: string

  - name: commerce
    label: Commerce Settings
    type: file
    path: content/commerce.json
    format: json
    fields:
      - name: apiBaseUrl
        label: Backend API URL
        type: string
      - name: useLiveBackendProducts
        label: Use Live Products
        type: boolean
      - name: checkoutMode
        label: Checkout Mode
        type: select
        options:
          - stripe_checkout
      - name: providerName
        label: Provider Name
        type: string
      - name: providerDashboardUrl
        label: Dashboard URL
        type: string
      - name: currency
        label: Currency
        type: string
      - name: currencySymbol
        label: Currency Symbol
        type: string
      - name: requireProfileEmail
        label: Require Email
        type: boolean
      - name: missingApiMessage
        label: Missing API Message
        type: string
      - name: missingEmailMessage
        label: Missing Email Message
        type: string
      - name: checkoutFailedMessage
        label: Checkout Failed Message
        type: string
      - name: checkoutRequestFailedMessage
        label: Checkout Request Failed
        type: string
      - name: paymentCancelledMessage
        label: Payment Cancelled
        type: string
