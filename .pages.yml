media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: site
    label: Site Settings
    type: file
    path: site.json
    format: json
    fields:
      - name: title
        label: Browser Title
        type: string
      - name: brandName
        label: Brand Name
        type: string

  - name: homepage
    label: Homepage
    type: file
    path: home.json
    format: json
    fields:
      - name: hero
        label: Hero Banner
        type: object
        fields:
          - name: title
            label: Main Center Title
            type: string
          - name: subtitle
            label: Center Subtitle
            type: text
          - name: kicker
            label: Top Left Label
            type: string
          - name: sideTitle
            label: Right Side Title
            type: string
          - name: sideSubtitle
            label: Right Side Subtitle
            type: text
          - name: fannedImages
            label: Hero Image Cards (Slide Gallery)
            type: image
            list: true
      - name: productSections
        label: Homepage Product Rows
        type: object
        list: true
        fields:
          - name: title
            label: Section Heading (e.g. New Arrivals)
            type: string
          - name: subtitle
            label: Section Subheading
            type: string
          - name: mode
            label: What products to show?
            type: select
            options: [latest, featured, category, collection]
          - name: value
            label: Category/Collection Name (Match the text exactly)
            type: string
            description: "If mode is category, type 'sneakers'. If mode is collection, type 'summer'."
          - name: limit
            label: Max Products to Display
            type: number

  - name: products
    label: Products Catalog
    type: file
    path: products.json
    format: json
    fields:
      - name: items
        label: Product List
        type: object
        list: true
        fields:
          - name: name
            label: Product Name
            type: string
          - name: category
            label: Category
            type: select
            options: [sneakers, apparel, accessories]
          - name: price
            label: Price
            type: number
          - name: images
            label: Product Images
            type: image
            list: true
          - name: featured
            label: Mark as Featured?
            type: boolean
