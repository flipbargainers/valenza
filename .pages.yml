media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: site
    label: Site Settings
    type: file
    path: site.json
    format: json
    fields:
      - name: title
        label: Browser Title
        type: string
      - name: brandName
        label: Brand Name
        type: string
      - name: nav
        label: Navigation Links
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: page
            label: Page
            type: string

  - name: products
    label: Products
    type: file
    path: products.json
    format: json
    fields:
      - name: items
        label: Product List
        type: object
        list: true
        fields:
          - name: name
            label: Name
            type: string
          - name: price
            label: Price
            type: number

  - name: homepage
    label: Homepage
    type: file
    path: home.json
    format: json
    fields:
      - name: reviewsTitle
        label: Reviews Title
        type: string

  - name: commerce
    label: Commerce
    type: file
    path: commerce.json
    format: json
    fields:
      - name: currency
        label: Currency
        type: string
